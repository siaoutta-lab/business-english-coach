name: Daily Business English Coach

on:
  schedule:
    # 每天北京时间早上 8:30 运行 (UTC 时间 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai

    # 1. 运行脚本并将 AI 生成的教案保存到一个临时文件 output.md
    - name: Run Coach Script
      env:
        AI_API_KEY: ${{ secrets.AI_API_KEY }}
      run: |
        python generate_coach.py > output.md
        cat output.md # 依然在控制台打印一份方便查看

    # 2. 自动通过 Gmail 发送邮件到指定的多人邮箱
    - name: Send Mail
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        
        # 【🚨 核心修改点 1】请把下面这一行改成你“发送邮件”的那个真实 Gmail 邮箱地址！
        username: 把这里删掉换成你用来发信的真实邮箱@gmail.com
        
        # 完美对齐你创建的暗号名字 EMAIL_GITHUB
        password: ${{ secrets.EMAIL_GITHUB }}
        
        # 邮件标题和发件人昵称
        subject: 🚀 今日商务英语每日课 (Daily English Coach)
        
        # 【🚨 核心修改点 2】同样把下面这一行改成你“发送邮件”的那个真实 Gmail 邮箱地址！
        from: AI Coach <把这里删掉换成你用来发信的真实邮箱@gmail.com>
        
        # 【已固定】三个精准的接收人邮箱，用英文逗号隔开
        to: siaoutta@gmail.com,267247961@qq.com,caisihao@asp.th.com
        
        # 邮件内容直接读取 AI 生成的 Markdown 文本
        html_body: file://output.md
